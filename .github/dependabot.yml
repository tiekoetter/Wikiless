version: 2
updates:
  # Maintain dependencies for GitHub Actions workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"

  # Maintain npm dependencies and package-lock.json.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"

  # Maintain Dockerfile base images.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"

  # Maintain docker-compose.yml service images.
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "daily"
